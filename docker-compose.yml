services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dockerjournal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=dockerjournal
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - EMAIL_USE_TLS=False
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "19000:19000"
      - "8081:8081"
    environment:
      - NODE_ENV=development
      - EXPO_PUBLIC_API_URL=http://localhost:8000
      - NODE_OPTIONS=--max-old-space-size=3072
      - EXPO_NO_SOURCE_MAPS=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    mem_limit: 4g
    mem_reservation: 3g

volumes:
  postgres_data: